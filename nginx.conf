user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
    worker_connections 1024;
}

http {
    client_max_body_size 100G;
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    access_log /var/log/nginx/access.log;
    error_log /var/log/nginx/error.log;

    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml application/atom+xml image/svg+xml text/x-component font/truetype font/opentype application/vnd.ms-fontobject;

    # ========================================
    # Site 1: dz.yamatu.xyz (Port 8686)
    # ========================================
    
    # HTTP -> HTTPS redirect for dz.yamatu.xyz
    server {
        listen 80;
        server_name dz.yamatu.xyz;
        return 301 https://$host$request_uri;
    }

    # HTTPS server for dz.yamatu.xyz
    server {
        listen 443 ssl http2;
        server_name dz.yamatu.xyz;

        # SSL certificate and key
        ssl_certificate /root/.acme.sh/dz.yamatu.xyz_ecc/fullchain.cer;
        ssl_certificate_key /root/.acme.sh/dz.yamatu.xyz_ecc/dz.yamatu.xyz.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        location / {
            proxy_http_version 1.1;
            proxy_pass http://127.0.0.1:8686/;
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $http_connection;
            proxy_read_timeout 3600s;
        }
    }

    # ========================================
    # Site 2: kindanddivine.com (Ports 3001 + 9001)
    # Redirect non-www to www
    # ========================================
    
    # HTTP: www.kindanddivine.com -> HTTPS
    server {
        listen 80;
        server_name www.kindanddivine.com;
        return 301 https://www.kindanddivine.com$request_uri;
    }
    
    # HTTP: kindanddivine.com -> HTTPS www
    server {
        listen 80;
        server_name kindanddivine.com;
        return 301 https://www.kindanddivine.com$request_uri;
    }
    
    # HTTPS: kindanddivine.com -> www
    server {
        listen 443 ssl http2;
        server_name kindanddivine.com;

        # SSL certificate and key
        ssl_certificate /root/.acme.sh/www.kindanddivine.com_ecc/fullchain.cer;
        ssl_certificate_key /root/.acme.sh/www.kindanddivine.com_ecc/www.kindanddivine.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        return 301 https://www.kindanddivine.com$request_uri;
    }

    # HTTPS: www.kindanddivine.com (main site)
    server {
        listen 443 ssl http2;
        server_name www.kindanddivine.com;

        # SSL certificate and key
        ssl_certificate /root/.acme.sh/www.kindanddivine.com_ecc/fullchain.cer;
        ssl_certificate_key /root/.acme.sh/www.kindanddivine.com_ecc/www.kindanddivine.com.key;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Client max body size (for file uploads)
        client_max_body_size 10M;

        # Backend API
        location /api/ {
            proxy_pass http://localhost:9001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Next.js frontend
        location / {
            proxy_pass http://localhost:3001;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
        }

        # Static file caching
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:3001;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }
    }

    # Include additional configs (if any)
    include /etc/nginx/conf.d/*.conf;
    include /etc/nginx/sites-enabled/*;
}